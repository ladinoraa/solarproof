name: Deploy Contracts

on:
  push:
    branches: [main]
    paths: ['apps/contracts/**']
  workflow_dispatch:
    inputs:
      network:
        description: Target network
        required: true
        default: testnet
        type: choice
        options: [testnet, mainnet]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network || 'testnet' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/contracts
      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt
      - name: Build
        run: stellar contract build
        working-directory: apps/contracts
      - name: Deploy energy_token
        id: deploy-energy
        run: |
          echo "contract_id=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/energy_token.wasm \
            --source ${{ secrets.DEPLOYER_SECRET_KEY }} \
            --network ${{ github.event.inputs.network || 'testnet' }})" >> $GITHUB_OUTPUT
        working-directory: apps/contracts
      - name: Deploy audit_registry
        id: deploy-registry
        run: |
          echo "contract_id=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/audit_registry.wasm \
            --source ${{ secrets.DEPLOYER_SECRET_KEY }} \
            --network ${{ github.event.inputs.network || 'testnet' }})" >> $GITHUB_OUTPUT
        working-directory: apps/contracts
      - name: Deploy community_governance
        id: deploy-governance
        run: |
          echo "contract_id=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/community_governance.wasm \
            --source ${{ secrets.DEPLOYER_SECRET_KEY }} \
            --network ${{ github.event.inputs.network || 'testnet' }})" >> $GITHUB_OUTPUT
        working-directory: apps/contracts
      - name: Setup Node for smoke test
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install JavaScript dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Run post-deployment smoke test
        run: pnpm exec node scripts/smoke-test.mjs
        env:
          SMOKE_NETWORK: ${{ github.event.inputs.network || 'testnet' }}
          ENERGY_TOKEN_ID: ${{ steps.deploy-energy.outputs.contract_id }}
          AUDIT_REGISTRY_ID: ${{ steps.deploy-registry.outputs.contract_id }}
          SMOKE_TOKEN_MINTER_SECRET_KEY: ${{ secrets.SMOKE_TOKEN_MINTER_SECRET_KEY }}
          SMOKE_METER_SECRET_KEY: ${{ secrets.SMOKE_METER_SECRET_KEY }}
