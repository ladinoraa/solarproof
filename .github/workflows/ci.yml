name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint + type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
        working-directory: apps/web
      - run: pnpm type-check
        working-directory: apps/web
      - run: pnpm build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_ENERGY_TOKEN_ID: placeholder
          NEXT_PUBLIC_AUDIT_REGISTRY_ID: placeholder
          NEXT_PUBLIC_COMMUNITY_GOVERNANCE_ID: placeholder

  contracts:
    name: Contracts (fmt + clippy + test)
    runs-on: ubuntu-latest
    env:
      # Rotate accounts per run to avoid faucet rate limits
      CI_ADMIN_ADDRESS: ${{ vars.CI_ADMIN_ADDRESS || '' }}
      CI_MINTER_ADDRESS: ${{ vars.CI_MINTER_ADDRESS || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/contracts
      - name: Fund test accounts via Stellar Testnet faucet
        run: |
          chmod +x scripts/fund-test-accounts.sh
          if [ -n "$CI_ADMIN_ADDRESS" ] && [ -n "$CI_MINTER_ADDRESS" ]; then
            scripts/fund-test-accounts.sh "$CI_ADMIN_ADDRESS" "$CI_MINTER_ADDRESS"
          else
            echo "No CI account addresses set; skipping faucet (unit tests use mock env)"
          fi
        continue-on-error: true  # faucet failures must not block unit tests
      - name: fmt
        run: cargo fmt --all -- --check
        working-directory: apps/contracts
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: apps/contracts
      - name: test
        run: cargo test --all
        working-directory: apps/contracts
