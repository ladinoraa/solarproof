name: E2E — Meter Reading Flow

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'scripts/e2e-meter-reading-flow.mjs'
      - 'apps/web/src/app/api/readings/**'
      - 'apps/web/src/lib/crypto.ts'

jobs:
  e2e:
    name: E2E meter reading flow
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run E2E test
        run: node scripts/e2e-meter-reading-flow.mjs
        env:
          API_URL: ${{ secrets.E2E_API_URL }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_AUDIT_REGISTRY_ID: ${{ secrets.NEXT_PUBLIC_AUDIT_REGISTRY_ID }}
          NEXT_PUBLIC_ENERGY_TOKEN_ID: ${{ secrets.NEXT_PUBLIC_ENERGY_TOKEN_ID }}
