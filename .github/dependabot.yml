version: 2
updates:
  # npm — monorepo root + all workspaces
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      patch-updates:
        update-types: [patch]
      minor-updates:
        update-types: [minor]
    labels:
      - dependencies
      - javascript
    ignore:
      # Flag major version bumps for manual review
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  # Cargo — contracts workspace
  - package-ecosystem: cargo
    directory: /apps/contracts
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      patch-updates:
        update-types: [patch]
      minor-updates:
        update-types: [minor]
    labels:
      - dependencies
      - rust
    ignore:
      # Flag major version bumps for manual review
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  # GitHub Actions — monthly to reduce noise
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    ignore:
      # Flag major version bumps for manual review
      - dependency-name: "*"
        update-types: [version-update:semver-major]
