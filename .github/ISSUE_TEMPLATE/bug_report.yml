name: 🐛 Bug Report
description: Report a bug
labels: [bug, needs-triage]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Web app, Smart contracts, API, Meter signing, Verifier, Documentation, Other]
    validations:
      required: true
